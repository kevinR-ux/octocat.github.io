<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Simulador de Calificaciones - Nivel Profesional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .contenedor {
            max-width: 1200px;
            margin: 0 auto;
        }

        .titulo {
            text-align: center;
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .subtitulo {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .grid-principal {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 153, 255, 0.1));
            padding: 25px;
            border-radius: 12px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            transition: all 0.3s ease;
        }

        .input-group:hover {
            border-color: rgba(0, 212, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #00d4ff;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(0, 212, 255, 0.4);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .input-group input.error {
            border-color: #ff1744;
            background: rgba(255, 23, 68, 0.1);
        }

        .input-group input.error:focus {
            box-shadow: 0 0 15px rgba(255, 23, 68, 0.3);
        }

        .botones {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-calcular {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-calcular:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }

        .btn-resetear {
            background: rgba(255, 23, 68, 0.8);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.3);
        }

        .btn-resetear:hover {
            background: rgba(255, 23, 68, 1);
            transform: translateY(-2px);
        }

        .btn-analisis, .btn-reporte, .btn-exportar {
            background: linear-gradient(135deg, #00c292, #00897b);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 194, 146, 0.3);
        }

        .btn-analisis:hover, .btn-reporte:hover, .btn-exportar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 194, 146, 0.5);
        }

        .resultado-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 100, 200, 0.1));
            padding: 30px;
            border-radius: 12px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            margin-bottom: 30px;
            display: none;
            animation: slideIn 0.5s ease;
        }

        .resultado-card.visible {
            display: block;
        }

        .resultado-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .resultado-item {
            text-align: center;
            background: rgba(0, 212, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #00d4ff;
        }

        .resultado-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }

        .resultado-valor {
            font-size: 24px;
            color: #00d4ff;
            font-weight: bold;
        }

        .barra-progreso {
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 15px;
        }

        .barra-progreso-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            width: 0%;
            transition: width 1.2s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-weight: bold;
            font-size: 12px;
        }

        .mensaje-motivacion {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            animation: slideIn 0.6s ease;
        }

        .mensaje-motivacion.visible {
            display: block;
        }

        .felicidades-perfecto {
            background: linear-gradient(135deg, rgba(255, 255, 0, 0.2), rgba(255, 152, 0, 0.2));
            border: 2px solid #ffff00;
            color: #ffff00;
            animation: celebracion 0.6s ease;
        }

        .tu-puedes {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.2), rgba(0, 194, 146, 0.2));
            border: 2px solid #00ff00;
            color: #00ff00;
        }

        @keyframes celebracion {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(2deg); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .graficos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .grafico-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), rgba(0, 153, 255, 0.08));
            padding: 25px;
            border-radius: 12px;
            border: 2px solid rgba(0, 212, 255, 0.2);
            display: none;
            animation: slideIn 0.5s ease;
        }

        .grafico-card.visible {
            display: block;
        }

        .grafico-card h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .grafico-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        .modal-analisis {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }

        .modal-contenido {
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
            color: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3);
        }

        .cerrar-modal {
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #00d4ff;
            transition: color 0.3s;
        }

        .cerrar-modal:hover {
            color: #fff;
        }

        .grid-analisis {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .card-stat {
            background: rgba(0, 212, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #00d4ff;
            text-align: center;
        }

        .valor-grande {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
            margin: 5px 0;
        }

        .valor-pequeno {
            font-size: 12px;
            opacity: 0.8;
        }

        .detalles-componentes {
            background: rgba(102, 51, 153, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .detalles-componentes table {
            width: 100%;
            border-collapse: collapse;
        }

        .detalles-componentes tr {
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding: 8px;
        }

        .detalles-componentes td {
            padding: 8px;
            font-size: 12px;
        }

        .rango-datos {
            background: rgba(0, 194, 146, 0.1);
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
        }

        .btn-cerrar {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        .btn-cerrar:hover {
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .titulo {
                font-size: 24px;
            }

            .grid-principal {
                grid-template-columns: 1fr;
            }

            .graficos-grid {
                grid-template-columns: 1fr;
            }

            .modal-contenido {
                width: 95%;
                padding: 20px;
            }

            .grid-analisis {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1 class="titulo">🎓 Innovación y Ética Empresarial</h1>
        <p class="subtitulo">Simulador de Calificaciones - Versión Pro</p>

        <div class="grid-principal">
            <div class="input-group">
                <label for="n1Input">📚 Actividad (0-20)</label>
                <input type="number" id="n1Input" min="0" max="20" placeholder="Ingresa nota">
            </div>
            <div class="input-group">
                <label for="n2Input">💬 Participación (0-20)</label>
                <input type="number" id="n2Input" min="0" max="20" placeholder="Ingresa nota">
            </div>
            <div class="input-group">
                <label for="n3Input">✏️ Cuestionario (0-20)</label>
                <input type="number" id="n3Input" min="0" max="20" placeholder="Ingresa nota">
            </div>
        </div>

        <div class="botones">
            <button class="btn-calcular" onclick="calcular()">🧮 Calcular</button>
            <button class="btn-resetear" onclick="resetear()">🔄 Limpiar</button>
            <button class="btn-analisis" onclick="mostrarAnalisisAvanzado()">📊 Análisis</button>
            <button class="btn-reporte" onclick="descargarReporte()">📄 Reporte</button>
            <button class="btn-exportar" onclick="exportarDatosCSV()">📥 Exportar CSV</button>
        </div>

        <div id="resultado" class="resultado-card">
            <h2>📊 Resultado del Cálculo</h2>
            <div class="resultado-grid">
                <div class="resultado-item">
                    <div class="resultado-label">Nota Final</div>
                    <div id="notaFinal" class="resultado-valor">0.00</div>
                </div>
                <div class="resultado-item">
                    <div class="resultado-label">Porcentaje</div>
                    <div id="estado" class="resultado-valor">0%</div>
                </div>
                <div class="resultado-item">
                    <div class="resultado-label">Estado</div>
                    <div id="estadoTexto" class="resultado-valor" style="font-size: 16px;">--</div>
                </div>
            </div>
            <div class="barra-progreso">
                <div id="barra" class="barra-progreso-fill"></div>
            </div>
            <div id="mensajeMotivacion" class="mensaje-motivacion"></div>
        </div>

        <div class="graficos-grid">
            <div id="barrasCard" class="grafico-card">
                <h3>📊 Gráfico de Barras</h3>
                <div class="grafico-container">
                    <canvas id="graficoBarras"></canvas>
                </div>
            </div>
            <div id="donutCard" class="grafico-card">
                <h3>🥐 Gráfico Donut (Ponderación)</h3>
                <div class="grafico-container">
                    <canvas id="graficoDonut"></canvas>
                </div>
            </div>
            <div id="lineaCard" class="grafico-card">
                <h3>📈 Gráfico de Línea</h3>
                <div class="grafico-container">
                    <canvas id="graficoLinea"></canvas>
                </div>
            </div>
            <div id="radarCard" class="grafico-card">
                <h3>🎯 Gráfico Radar (Comparativo)</h3>
                <div class="grafico-container">
                    <canvas id="graficoRadar"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        const n1Input = document.getElementById('n1Input');
        const n2Input = document.getElementById('n2Input');
        const n3Input = document.getElementById('n3Input');
        const resultado = document.getElementById('resultado');
        const notaFinal = document.getElementById('notaFinal');
        const estado = document.getElementById('estado');
        const estadoTexto = document.getElementById('estadoTexto');
        const barra = document.getElementById('barra');
        const barrasCard = document.getElementById('barrasCard');
        const donutCard = document.getElementById('donutCard');
        const lineaCard = document.getElementById('lineaCard');
        const radarCard = document.getElementById('radarCard');
        const mensajeMotivacion = document.getElementById('mensajeMotivacion');

        let chartsObjects = {
            barras: null,
            donut: null,
            linea: null,
            radar: null
        };

        // ==========================================
        // VALIDACIÓN EN TIEMPO REAL
        // ==========================================
        function validarInput(e) {
            const valor = parseFloat(e.target.value);
            if (e.target.value === '') {
                e.target.classList.remove('error');
                return;
            }
            if (isNaN(valor) || valor < 0 || valor > 20) {
                e.target.classList.add('error');
            } else {
                e.target.classList.remove('error');
            }
        }

        [n1Input, n2Input, n3Input].forEach(input => {
            input.addEventListener('input', validarInput);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') calcular();
            });
        });

        // ==========================================
        // FUNCIÓN PRINCIPAL DE CÁLCULO
        // ==========================================
        function calcular() {
            const n1 = parseFloat(n1Input.value);
            const n2 = parseFloat(n2Input.value);
            const n3 = parseFloat(n3Input.value);

            if (isNaN(n1) || isNaN(n2) || isNaN(n3) || n1 < 0 || n1 > 20 || n2 < 0 || n2 > 20 || n3 < 0 || n3 > 20) {
                alert('⚠️ Ingresa notas válidas entre 0 y 20');
                return;
            }

            const promedio = (n1 * 0.4) + (n2 * 0.3) + (n3 * 0.3);
            const porcentaje = ((promedio / 20) * 100).toFixed(1);

            mostrarResultado(promedio, porcentaje, n1, n2, n3);
            actualizarTodosGraficos(n1, n2, n3, promedio);
            guardarEnHistorial(n1, n2, n3, promedio);
            verificarMejora(promedio);
        }

        // ==========================================
        // MOSTRAR RESULTADO
        // ==========================================
        function mostrarResultado(promedio, porcentaje, p1, p2, p3) {
            notaFinal.innerHTML = promedio.toFixed(2);
            estado.innerHTML = porcentaje + '%';
            
            const estado_text = promedio >= 10.5 ? '✅ APROBADO' : '❌ NO APROBADO';
            estadoTexto.innerHTML = estado_text;

            barra.style.width = porcentaje + '%';
            barra.innerHTML = porcentaje + '%';

            resultado.classList.add('visible');

            // Mensaje motivacional
            mensajeMotivacion.classList.remove('felicidades-perfecto', 'tu-puedes');
            mensajeMotivacion.innerHTML = '';

            if (promedio === 20) {
                mensajeMotivacion.innerHTML = "🎊 ¡¡¡PERFECTO!!! ¡¡¡FELICIDADES!!! 🎊<br>¡Obtuviste la nota máxima! ¡Eres EXTRAORDINARIO!";
                mensajeMotivacion.classList.add('felicidades-perfecto');
            } else if (promedio >= 10.5 && promedio < 12) {
                mensajeMotivacion.innerHTML = "💪 ¡TÚ PUEDES! Sigue así, vas muy bien. ¡Adelante!";
                mensajeMotivacion.classList.add('tu-puedes');
            } else if (promedio >= 12 && promedio < 15) {
                mensajeMotivacion.innerHTML = "✨ ¡Buen trabajo! Vas por buen camino. 📈";
                mensajeMotivacion.classList.add('tu-puedes');
            } else if (promedio >= 15) {
                mensajeMotivacion.innerHTML = "🌟 ¡¡¡EXCELENTE DESEMPEÑO!!! ¡Sigue así! 🚀";
                mensajeMotivacion.classList.add('felicidades-perfecto');
            } else {
                mensajeMotivacion.innerHTML = "📚 Necesitas mejorar. ¡Puedes hacerlo! 💪";
                mensajeMotivacion.classList.add('tu-puedes');
            }

            if (mensajeMotivacion.innerHTML) {
                mensajeMotivacion.classList.add('visible');
            }
        }

        // ==========================================
        // ACTUALIZAR TODOS LOS GRÁFICOS
        // ==========================================
        function actualizarTodosGraficos(n1, n2, n3, promedio) {
            barrasCard.classList.add('visible');
            donutCard.classList.add('visible');
            lineaCard.classList.add('visible');
            radarCard.classList.add('visible');

            setTimeout(() => {
                try {
                    crearGraficoBarras(n1, n2, n3);
                    crearGraficoDonut();
                    crearGraficoLinea(n1, n2, n3, promedio);
                    crearGraficoRadar(n1, n2, n3, promedio);
                    console.log('✅ Gráficos cargados correctamente');
                } catch (error) {
                    console.error('❌ Error al crear gráficos:', error);
                }
            }, 150);
        }

        // ==========================================
        // GRÁFICO 1: BARRAS CON ANÁLISIS DETALLADO
        // ==========================================
        function crearGraficoBarras(n1, n2, n3) {
            if (chartsObjects.barras) chartsObjects.barras.destroy();
            
            const p1 = (n1 * 0.4).toFixed(2);
            const p2 = (n2 * 0.3).toFixed(2);
            const p3 = (n3 * 0.3).toFixed(2);
            
            chartsObjects.barras = new Chart(document.getElementById('graficoBarras'), {
                type: 'bar',
                data: {
                    labels: ['Actividad\n(40%)', 'Participación\n(30%)', 'Cuestionario\n(30%)'],
                    datasets: [{
                        label: 'Notas Obtenidas',
                        data: [n1, n2, n3],
                        backgroundColor: [
                            'rgba(102, 51, 153, 0.9)',
                            'rgba(0, 122, 204, 0.9)',
                            'rgba(0, 194, 146, 0.9)'
                        ],
                        borderColor: [
                            'rgba(153, 102, 204, 1)',
                            'rgba(0, 173, 255, 1)',
                            'rgba(0, 255, 200, 1)'
                        ],
                        borderWidth: 3,
                        borderRadius: 12,
                        borderSkipped: false,
                        hoverBackgroundColor: [
                            'rgba(127, 80, 180, 1)',
                            'rgba(0, 150, 230, 1)',
                            'rgba(0, 220, 170, 1)'
                        ],
                        hoverBorderWidth: 4,
                        barPercentage: 0.75,
                        categoryPercentage: 0.85
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 1200,
                        easing: 'easeInOutQuad',
                        delay: (ctx) => ctx.dataIndex * 100
                    },
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                color: '#fff',
                                font: { size: 13, weight: 'bold' },
                                padding: 20,
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            enabled: true,
                            backgroundColor: 'rgba(0, 0, 0, 0.95)',
                            padding: 15,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 12 },
                            borderColor: '#00d4ff',
                            borderWidth: 2,
                            displayColors: true,
                            bodySpacing: 8,
                            callbacks: {
                                title: (ctx) => `📊 ${ctx[0].label}`,
                                label: (ctx) => {
                                    const labels = ['Actividad', 'Participación', 'Cuestionario'];
                                    const pesos = [0.4, 0.3, 0.3];
                                    const idx = ctx.dataIndex;
                                    const valor = ctx.parsed.y;
                                    const ponderado = (valor * pesos[idx]).toFixed(2);
                                    return [
                                        `Nota Obtenida: ${valor.toFixed(2)}/20`,
                                        `Ponderación: ${pesos[idx]*100}%`,
                                        `Aportación: ${ponderado} puntos`
                                    ];
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 20,
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.7)',
                                font: { size: 11, weight: '500' },
                                stepSize: 2,
                                callback: (value) => value + '/20'
                            },
                            grid: {
                                color: 'rgba(0, 212, 255, 0.15)',
                                lineWidth: 1,
                                drawBorder: false
                            }
                        },
                        x: {
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.7)',
                                font: { size: 12, weight: '600' }
                            },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // ==========================================
        // GRÁFICO 2: DONUT CON DATOS DETALLADOS
        // ==========================================
        function crearGraficoDonut() {
            if (chartsObjects.donut) chartsObjects.donut.destroy();
            
            chartsObjects.donut = new Chart(document.getElementById('graficoDonut'), {
                type: 'doughnut',
                data: {
                    labels: ['Actividad\n40%', 'Participación\n30%', 'Cuestionario\n30%'],
                    datasets: [{
                        data: [40, 30, 30],
                        backgroundColor: [
                            'rgba(102, 51, 153, 0.85)',
                            'rgba(0, 122, 204, 0.85)',
                            'rgba(0, 194, 146, 0.85)'
                        ],
                        borderColor: [

        // ==========================================
        // ANÁLISIS ESTADÍSTICO AVANZADO
        // ==========================================
        function generarAnalisisEstadistico(n1, n2, n3, promedio) {
            const config = {
                pesoActividad: 0.4,
                pesoParticipacion: 0.3,
                pesoQuiz: 0.3,
                notaMinimaAprobacion: 10.5,
                notaMaxima: 20
            };
            
            const aportes = {
                actividad: (n1 * config.pesoActividad).toFixed(2),
                participacion: (n2 * config.pesoParticipacion).toFixed(2),
                quiz: (n3 * config.pesoQuiz).toFixed(2)
            };
            
            const desviaciones = {
                actividad: (n1 - promedio).toFixed(2),
                participacion: (n2 - promedio).toFixed(2),
                quiz: (n3 - promedio).toFixed(2)
            };
            
            const valores = [n1, n2, n3];
            const media = promedio;
            const varianza = (((n1-media)**2 + (n2-media)**2 + (n3-media)**2) / 3).toFixed(2);
            const desviacionEstándar = Math.sqrt(varianza).toFixed(2);
            
            const minimo = Math.min(n1, n2, n3);
            const maximo = Math.max(n1, n2, n3);
            const rango = (maximo - minimo).toFixed(2);
            
            const porcentaje = ((promedio / config.notaMaxima) * 100).toFixed(1);
            const estado = promedio >= config.notaMinimaAprobacion ? '✅ APROBADO' : '❌ NO APROBADO';
            const nivelDesempeño = promedio >= 18 ? 'EXCELENTE' : 
                                   promedio >= 15 ? 'MUY BUENO' : 
                                   promedio >= 12 ? 'BUENO' : 
                                   promedio >= 10.5 ? 'ACEPTABLE' : 'INSUFICIENTE';
            
            return {
                promedio: promedio.toFixed(2),
                porcentaje,
                estado,
                nivelDesempeño,
                aportes,
                desviaciones,
                varianza,
                desviacionEstándar,
                minimo,
                maximo,
                rango,
                mejorDesempeño: maximo === n1 ? 'Actividad' : maximo === n2 ? 'Participación' : 'Cuestionario'
            };
        }

        // ==========================================
        // EXPORTACIÓN DE DATOS A CSV
        // ==========================================
        function exportarDatosCSV() {
            const historial = JSON.parse(localStorage.getItem('simuladorHistorial')) || [];
            
            if (historial.length === 0) {
                alert('No hay datos para exportar');
                return;
            }
            
            const encabezados = ['Fecha', 'Actividad', 'Participación', 'Cuestionario', 'Promedio', 'Porcentaje', 'Estado'];
            
            let contenidoCSV = encabezados.join(',') + '\n';
            historial.forEach(registro => {
                const fila = [
                    registro.fecha,
                    registro.n1,
                    registro.n2,
                    registro.n3,
                    registro.promedio,
                    ((registro.promedio / 20) * 100).toFixed(1) + '%',
                    registro.promedio >= 10.5 ? 'APROBADO' : 'NO APROBADO'
                ];
                contenidoCSV += fila.join(',') + '\n';
            });
            
            const blob = new Blob([contenidoCSV], { type: 'text/csv;charset=utf-8;' });
            const enlace = document.createElement('a');
            enlace.href = URL.createObjectURL(blob);
            enlace.download = `Simulador_Calificaciones_${new Date().toISOString().split('T')[0]}.csv`;
            enlace.click();
        }

        // ==========================================
        // GUARDAR EN HISTORIAL
        // ==========================================
        function guardarEnHistorial(n1, n2, n3, promedio) {
            let historial = JSON.parse(localStorage.getItem('simuladorHistorial')) || [];
            
            const registro = {
                fecha: new Date().toLocaleString('es-ES'),
                n1: n1,
                n2: n2,
                n3: n3,
                promedio: parseFloat(promedio.toFixed(2))
            };
            
            historial.push(registro);
            
            if (historial.length > 50) {
                historial = historial.slice(-50);
            }
            
            localStorage.setItem('simuladorHistorial', JSON.stringify(historial));
        }

        // ==========================================
        // COMPARAR CON MEJOR REGISTRO
        // ==========================================
        function compararConMejorRegistro(promedio) {
            const historial = JSON.parse(localStorage.getItem('simuladorHistorial')) || [];
            
            if (historial.length === 0) return null;
            
            const mejorRegistro = Math.max(...historial.map(r => r.promedio));
            const diferenciaConMejor = (mejorRegistro - promedio).toFixed(2);
            
            return {
                mejorRegistro: mejorRegistro.toFixed(2),
                promedio: promedio.toFixed(2),
                diferencia: diferenciaConMejor,
                esNuevoMaximo: promedio > mejorRegistro
            };
        }

        // ==========================================
        // VERIFICAR MEJORA
        // ==========================================
        function verificarMejora(promedio) {
            const historial = JSON.parse(localStorage.getItem('simuladorHistorial')) || [];
            
            if (historial.length === 0) return;
            
            const mejorAnterior = Math.max(...historial.map(r => r.promedio));
            
            if (promedio > mejorAnterior) {
                const notif = document.createElement('div');
                notif.style.cssText = 'position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg, #ffff00, #ff9800);color:black;padding:20px;border-radius:10px;box-shadow:0 10px 30px rgba(255, 255, 0, 0.3);font-weight:bold;animation:slideIn 0.5s ease;z-index:10000;';
                notif.innerHTML = '🎉 !!!NUEVO MAXIMO PERSONAL!!!<br><small>Anterior: ' + mejorAnterior.toFixed(2) + ' → Actual: ' + promedio.toFixed(2) + '</small>';
                
                document.body.appendChild(notif);
                
                setTimeout(() => notif.remove(), 5000);
            }
        }
